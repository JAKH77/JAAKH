<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JAAAKH</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;

      /* خلفية ناعمة مو سوداء */
      background: linear-gradient(to right, #f5f7fa, #c3cfe2);
      color: #333;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 40px;
      color: #222;
    }

    p {
      font-size: 18px;
      margin-top: 10px;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #45a049;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Welcome to JAAAKH</h1>
    <p>This is my first website 🚀</p>

    <button class="btn" onclick="alert('Welcome to JAAAKH')">
      Contact Us
    </button>
  </div>

</body>
</html>
